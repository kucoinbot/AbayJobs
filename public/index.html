<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AbayJobs – Habesha Community Jobs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .banner {
      width: 100%;
      height: 120px;
      background: #ddd;
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .filters {
      padding: 10px;
      background: white;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filters select,
    .filters input {
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .job-list {
      padding: 20px;
    }

    .job-card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .job-card h3 {
      margin: 0 0 5px 0;
    }

    .ad-slot {
      background: #ffe08a;
      padding: 20px;
      text-align: center;
      margin: 20px 0;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>AbayJobs – Habesha Community Jobs</header>

<div class="banner">Ad Banner – Promote Your Business</div>

<div class="filters">
  <input type="text" id="keyword" placeholder="Keyword…" />
  <input type="text" id="location" placeholder="Location…" />
  <select id="category">
    <option value="">All Categories</option>
    <option value="IT">IT</option>
    <option value="Driving">Driving</option>
    <option value="Warehouse">Warehouse</option>
    <option value="Cleaning">Cleaning</option>
  </select>
  <button onclick="searchJobs()">Search</button>
</div>

<div class="ad-slot">Advertise Here – Contact Us</div>

<div class="job-list" id="jobList"></div>

<script>
  function renderJobs(jobs) {
    const container = document.getElementById("jobList");
    container.innerHTML = "";

    if (!jobs || jobs.length === 0) {
      container.innerHTML = "<p>No jobs found.</p>";
      return;
    }

    jobs.forEach(job => {
      const div = document.createElement("div");
      div.className = "job-card";
      div.innerHTML = `
        <h3>${job.title || "Untitled Job"}</h3>
        <p><strong>Company:</strong> ${job.company || "Unknown"}</p>
        <p><strong>Location:</strong> ${job.location || "N/A"}</p>
        <p>${job.description?.slice(0, 150) || ""}...</p>
      `;
      container.appendChild(div);
    });
  }

  async function searchJobs() {
    const keyword = document.getElementById("keyword").value;
    const location = document.getElementById("location").value;

    const params = new URLSearchParams({
      keywords: keyword,
      location: location
    });

    const reedRes = await fetch(`/api/reed?${params}`);
    const reedData = await reedRes.json();

    const adzunaRes = await fetch(`/api/adzuna?${params}`);
    const adzunaData = await adzunaRes.json();

    const combined = [
      ...(reedData.results || []),
      ...(adzunaData.results || [])
    ];

    renderJobs(combined);
  }
</script>

</body>
</html>
