<script>
var allJobs = [];
var savedJobs = JSON.parse(localStorage.getItem('savedJobs') || '[]');
var loadedPages = new Set();

var currentPage = 1;
var currentKeyword = '';
var currentLocation = '';

var isLoading = false;
var hasMore = true;

window.addEventListener('DOMContentLoaded', function() {
  loadJobs('', '', 1, true);
  window.addEventListener('scroll', handleScroll);
});

function handleSearch() {
  currentKeyword = document.getElementById('kw-input').value.trim();
  currentLocation = document.getElementById('city-input').value.trim();

  currentPage = 1;
  allJobs = [];
  loadedPages.clear();
  hasMore = true;

  loadJobs(currentKeyword, currentLocation, 1, true);
}

function loadJobs(kw, loc, page = 1, reset = false) {
  if (isLoading || loadedPages.has(page) || !hasMore) return;

  isLoading = true;
  loadedPages.add(page);

  if (reset) {
    document.getElementById('jobs-list').innerHTML = '<div class="loading">Loading jobs...</div>';
  }

  Promise.all([
    fetch(`/api/reed?keywords=${kw}&location=${loc}&page=${page}`).then(r => r.json()),
    fetch(`/api/adzuna?keywords=${kw}&location=${loc}&page=${page}`).then(r => r.json())
  ]).then(([reed, adzuna]) => {

    let newJobs = [];

    reed.results?.forEach(j => {
      newJobs.push({
        id: 'r_' + j.jobId,
        title: j.jobTitle,
        company: j.employerName,
        location: j.locationName,
        salary: j.minimumSalary || 'N/A',
        source: 'Reed',
        url: j.jobUrl
      });
    });

    adzuna.results?.forEach(j => {
      newJobs.push({
        id: 'a_' + j.id,
        title: j.title,
        company: j.company?.display_name,
        location: j.location?.display_name,
        salary: j.salary_min || 'N/A',
        source: 'Adzuna',
        url: j.redirect_url
      });
    });

    const seen = new Set(allJobs.map(j => j.id));
    newJobs.forEach(j => {
      if (!seen.has(j.id)) allJobs.push(j);
    });

    if (newJobs.length === 0) hasMore = false;

    renderJobs(reset);

    isLoading = false;
    currentPage++;

  }).catch(() => isLoading = false);
}

function renderJobs(reset = false) {
  const list = document.getElementById('jobs-list');
  if (reset) list.innerHTML = '';

  list.innerHTML = allJobs.map(j => `
    <div class="job-card">
      <div>
        <div class="jtitle">${escapeHTML(j.title)}</div>
        <div class="jcompany">${escapeHTML(j.company)}</div>
        <div class="jmeta">
          <span>📍 ${escapeHTML(j.location)}</span>
          <span>💷 ${j.salary}</span>
        </div>
      </div>
      <div class="jside">
        <span class="src-tag">${j.source}</span>
        <button onclick="toggleSave('${j.id}')" style="margin-bottom:6px;">
          ${savedJobs.includes(j.id) ? '❤️ Saved' : '🤍 Save'}
        </button>
        <a href="${j.url}" target="_blank">
          <button class="btn-apply">Apply</button>
        </a>
      </div>
    </div>
  `).join('');
}

function toggleSave(id) {
  if (savedJobs.includes(id)) {
    savedJobs = savedJobs.filter(j => j !== id);
  } else {
    savedJobs.push(id);
  }
  localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
  renderJobs();
}

function handleScroll() {
  if (isLoading || !hasMore) return;

  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    loadJobs(currentKeyword, currentLocation, currentPage);
  }
}

function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;'
  })[c]);
}

document.getElementById('city-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSearch();
});
</script>
